    <!-- ===== تَب ۳ — گروه‌بندی پورت‌ها ===== -->
    <div class="tab-panel" id="tab3">
        <div class="form-row">
            <div class="form-group">
                <label for="portDelimiter">جداکننده آی‌پی و پورت</label>
                <input type="text" id="portDelimiter" placeholder="مثلاً : یا #" value=":" maxlength="5">
                <div class="quick-btns">
                    <button class="quick-btn port-quick" data-char=":"> : </button>
                    <button class="quick-btn port-quick" data-char="#"> # </button>
                    <button class="quick-btn port-quick" data-char="@"> @ </button>
                </div>
                <small class="hint">با این کاراکتر، آی‌پی از پورت جدا می‌شود.</small>
            </div>
        </div>
        <div class="textarea-group">
            <label for="inputText3">لیست ورودی (هر خط یک آی‌پی:پورت)</label>
            <textarea id="inputText3" placeholder="مثال:&#10;192.168.1.1:8080&#10;10.0.0.5:443&#10;192.168.1.1:9090&#10;10.0.0.5:443"></textarea>
        </div>
        <div class="button-group">
            <button class="btn btn-primary" id="processBtn3">📊 گروه‌بندی</button>
            <button class="btn btn-secondary" id="clearBtn3">🗑️ پاک‌کردن</button>
        </div>

        <div class="output-area">
            <label>نتیجه (جدول با علامت تکراری)</label>
            <div class="table-wrapper" id="tableWrapper">
                <div class="no-data">برای مشاهده نتیجه، ورودی را وارد کرده و «گروه‌بندی» را بزنید.</div>
            </div>
        </div>

        <div class="textarea-group output-area" style="margin-top:18px;">
            <label>خروجی خطی (ip:port) — بدون هیچ گونه تکراری</label>
            <textarea id="outputText3" readonly></textarea>
        </div>
        <div class="button-group">
            <button class="btn btn-info" id="extractBtn">📋 دریافت خروجی ip:port</button>
            <button class="btn btn-success" id="copyBtn3">📋 کپی خروجی خطی</button>
        </div>

        <div class="hint" style="text-align:center; margin-top:8px;">
            • پورت‌های تکراری در جدول با <span style="color:var(--danger); font-weight:600;">🔴 تکراری</span> مشخص می‌شوند.<br>
            • خروجی خطی شامل هر ترکیب <strong>ip:port</strong> فقط یک بار (بدون تکرار) است.
        </div>
    </div>
